        </div> </div> <div class="prop-descrip">The type of funding for the card (e.g., <code>credit</code>, <code>debit</code>).</div> </div> </div>
        </div> </details> </div> </div>
        <div class="row attribute small-line" id="overview-payment_method-bank_transfer"> <div class="property-wrapper"> <div class="table-flex"> <div class="property"> bank_transfer </div> <div class="property-datatype"> object </div> <div class="property-kind" id="Optional">
        </div> </div> <div class="prop-descrip">Contains bank transfer details.</div> <details> <summary class="link"> <span class="show-hide-attribute-text" data-showhide="Show Sub-Attributes">Show Sub-Attributes</span> <img src="/in/payments/api/v1/images/dropdown-arrow.svg" class="arrow-icon" alt="arrow" width="9px" height="9px">
        </summary> <div class="nested-attribute-wrapper"> <div class="row attribute small-line" id="overview-payment_method-bank_transfer-virtual_account_number"> <div class="property-wrapper"> <div class="table-flex"> <div class="property"> virtual_account_number </div> <div class="property-datatype"> string </div> <div class="property-kind" id="Optional">
        </div> </div> <div class="prop-descrip">The virtual account number.</div> </div> </div> <div class="row attribute small-line" id="overview-payment_method-bank_transfer-mode"> <div class="property-wrapper"> <div class="table-flex"> <div class="property"> mode </div> <div class="property-datatype"> string </div> <div class="property-kind" id="Optional">
        </div> </div> <div class="prop-descrip">The mode of bank transfer (e.g., <code class="url">NEFT</code>, <code class="url">RTGS</code>, <code class="url">IMPS</code>).</div> </div> </div> <div class="row attribute small-line" id="overview-payment_method-bank_transfer-payer_name"> <div class="property-wrapper"> <div class="table-flex"> <div class="property"> payer_name </div> <div class="property-datatype"> string </div> <div class="property-kind" id="Optional">
        </div> </div> <div class="prop-descrip">The payer name.</div> </div> </div> <div class="row attribute small-line" id="overview-payment_method-bank_transfer-payer_account_no"> <div class="property-wrapper"> <div class="table-flex"> <div class="property"> payer_account_no </div> <div class="property-datatype"> string </div> <div class="property-kind" id="Optional">
        </div> </div> <div class="prop-descrip">The account number of the payer.</div> </div> </div> <div class="row attribute small-line" id="overview-payment_method-bank_transfer-payer_ifsc_code"> <div class="property-wrapper"> <div class="table-flex"> <div class="property"> payer_ifsc_code </div> <div class="property-datatype"> string </div> <div class="property-kind" id="Optional">
        </div> </div> <div class="prop-descrip">The IFSC of the payer’s bank.</div> </div> </div>
        </div> </details> </div> </div>

        </div>  </details> 
        <br> Payment method with UPI details
      type: object
      properties:
        type:
          $ref: '#/components/schemas/type'
        upi:
          $ref: '#/components/schemas/upi'
        mandate_id:
          description: The mandate ID associated with the recurring payment.
          type: string
          example: '216000001494790'
    payment_method_retrieve:
      description: Payment method details in the retrieved payment list.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/type'
    fcy_fee_amount:
      description: The fee amount in foreign currency.
      type: string
      example: '4.00'
    fee_type:
      description: 'Type of fee: <code>processing_fee</code>, <code>conversion_fee</code>, or <code>payment_failure_fee</code>.'
      type: string
      example: processing_fee
    is_refunded:
      description: Indicates whether any transaction fees have been refunded (is_refunded is either <code>true</code>, or <code>false</code>).
      type: boolean
      example: false
    processing_fee:
      description: Contains details about the processing fee.
      type: object
      properties:
        fee_amount:
          description: The fee amount in the base currency.
          type: string
          example: '4.00'
        fcy_fee_amount:
          $ref: '#/components/schemas/fcy_fee_amount'
        fee_type:
          $ref: '#/components/schemas/fee_type'
        is_refunded:
          $ref: '#/components/schemas/is_refunded'
    type:
      description: The type of payment method. This can be <code>upi</code>, <code>net_banking</code>, <code>bank_transfer</code>, and <code>card</code>.
      type: string
      example: upi
    card:
      description: Contains card details.
      type: object
      properties:
        card_holder_name:
          description: The name of the cardholder.
          type: string
          example: Akash
        last_four_digits:
          description: The last four digits of the card number.
          type: string
          example: '3212'
        expiry_month:
          description: The month when the card expires, formatted as MM.
          type: string
          example: '01'
        expiry_year:
          description: The year when the card expires, formatted as YY.
          type: string
          example: '26'
        brand:
          description: The brand of the card (e.g., <code>visa</code>, <code>master_card</code>, <code>rupay</code>).
          type: string
          example: rupay
        funding:
          description: The type of funding for the card (e.g., <code>credit</code>, <code>debit</code>).
          type: string
          example: debit
    upi:
      description: Contains UPI details.
      type: object
      properties:
        upi_id:
          description: The UPI ID associated with the transaction.
          type: string
          example: akash@examplebank
        channel:
          description: The UPI channel or app used for the transaction.
          type: string
          example: qr
        account_type:
          description: The type of account linked with the UPI transaction.
          type: string
          example: bank_account
    net_banking:
      description: Contains net banking details.
      type: object
      properties:
        bank_name:
          description: The name of the bank used in the net banking transaction.
          type: string
          example: test_bank
    bank_transfer:
      description: Contains bank transfer details.
      type: object
      properties:
        virtual_account_number:
          description: The virtual account number.
          type: string
          example: '9876543210'
        mode:
          description: The mode of bank transfer. This can be <code>NEFT</code>, <code>RTGS</code>, or <code>IMPS</code>.
          type: string
          example: NEFT
        payer_name:
          description: The payer name.
          type: string
          example: John Doe
        payer_account_no:
          description: The payer account number.
          type: string
          example: '1234567890'
        payer_ifsc_code:
          description: The payer IFSC code.
          type: string
          example: ABCD0123456
    refunds:
      description: Refund details
      type: array
      items:
        type: object
        properties:
          refund_id:
            description: The unique identifier created for the refund.
            type: string
            example: '1987000000724259'
          default_currency_amount:
            description: Amount in the default or settlement currency.
            type: number
            format: double
            example: '100.00'
          amount:
            description: The amount for which the refund was created.
            type: number
            format: double
            example: '100.00'
          type:
            description: 'The type of refund: <code>initiated_by_merchant</code>, <code>initiated_by_customer</code>, or <code>initiated_by_system</code>'
            type: string
            example: initiated_by_merchant
          initiated_by_id:
            description: ID of the entity that initiated the refund.
            type: string
            example: '1987000000662193'
          initiated_by:
            description: The entity that initiated the refund.
            type: string
            example: Akash
          reason:
            description: 'The reason for the refund:  <code>duplicate</code>, <code>fraudulent</code>,<code>requested_by_customer</code>,<code>others</code>,<code>system_initiated</code>, and <code>expired_uncaptured_charge</code>'
            type: string
            example: requested_by_customer
          description:
            description: A description of the refund.
            type: string
            example: ''
          status:
